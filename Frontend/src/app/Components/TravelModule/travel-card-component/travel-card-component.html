<div class="travel-card">

  <div class=""card-image>
    <img [src]="travelItem.url" alt="Reference image">
  </div>
  
  <div class="card-header">
    <span class="type-badge">{{ travelItem.type }}</span>
    <span class="rating-badge">⭐ {{ travelItem.rating }}</span>
  </div>
  
  <div class="card-content">
    <h4>Trip to {{ travelItem.name }}</h4>
    <p class="meta-text">📍 Country: {{ travelItem.country }} | Duration: {{ travelItem.duration }}</p>
    <div class="price-tag">{{ travelItem.price | currency:'INR':'symbol':'1.0-0' }}</div>
  </div>

  <div class="card-footer">
    <button>View Details</button>
    <button>Book Now</button>
  </div>
</div>
