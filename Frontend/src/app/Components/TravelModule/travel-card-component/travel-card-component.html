<div class="travel-summary-card">
  <div class="card-details-header">
    <span class="type-tag">{{ travelItem.type }}</span>
    <span class="rating-badge">⭐ {{ travelItem.rating }}</span>
  </div>
  
  <div class="card-details">
    <div class="card-header-row">
      <h4>Trip to {{ travelItem.name }}</h4>
    </div>
    
    <p class="duration-text">📍 Country: {{ travelItem.country }} | Duration: {{ travelItem.duration }}</p>

    <div class="footer-metrics">
      <span class="price-pill">{{ travelItem.price | currency:'INR':'symbol':'1.0-0' }}</span>
      <span class="action-arrow-hint">View Packages →</span>
    </div>
  </div>
</div>
