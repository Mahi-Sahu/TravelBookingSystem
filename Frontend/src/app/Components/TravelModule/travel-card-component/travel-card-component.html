<div class="travel-summary-card" (click)="handleCardClick()">
  <div class="card-image-wrapper">
    <img src="assets/placeholder-travel.jpg" [alt]="travelItem.destination">
    <span class="type-tag">{{ travelItem.serviceType }}</span>
  </div>
  <div class="card-details">
    <h4>Trip to {{ travelItem.destination }}</h4>
    <p class="location-text">📍 {{ travelItem.destination }} ({{ travelItem.duration }})</p>
    <div class="footer-metrics">
      <span class="price-pill">{{ travelItem.price | currency:'INR':'symbol':'1.0-0' }}</span>
      <span class="slots-indicator" [class.low-stock]="travelItem.availability < 3">
        {{ travelItem.availability }} slots left
      </span>
    </div>
  </div>
</div>
