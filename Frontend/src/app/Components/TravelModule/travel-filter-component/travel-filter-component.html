<div class="filter-panel">
  <div class="filter-group">
    <label>
      Maximum Budget: {{ currentFilters().budgetRange | currency:'INR':'symbol':'1.0-0' }}
    </label>
    <input 
      type="range" 
      min="5000" 
      max="150000" 
      step="5000"
      [value]="currentFilters().budgetRange"
      (input)="onBudgetChange($event)"
      class="budget-slider"
    >
  </div>

  <div class="filter-group mt-4">
    <label>Minimum Base Rating</label>
    <div class="rating-pills">
      @for (ratingValue of [3, 4, 4.5, 5]; track ratingValue) {
        <button 
          [class.active]="currentFilters().rating === ratingValue"
          (click)="onRatingChange(ratingValue)"
          class="pill-btn"
        >
          {{ ratingValue }}+ ★
        </button>
      }
    </div>
  </div>
</div>
