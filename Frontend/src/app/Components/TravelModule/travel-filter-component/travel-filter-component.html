<div class="filter-sidebar">
  <h4>Refine Listings</h4>
  
  <div class="filter-group">
    <label>Maximum Budget: {{ travelService.filters().budgetRange | currency:'INR':'symbol':'1.0-0' }}</label>
    
    <input 
      type="range" 
      min="1000" 
      max="500000" 
      step="1000" 
      [value]="travelService.filters().budgetRange" 
      (input)="onBudgetRangeChange($event)" 
      class="range-slider" />
  </div>
  
  <div class="filter-group">
    <label>Minimum Review Score</label>
    <div class="rating-options">
      @for (ratingValue of [3, 4, 5]; track ratingValue) {
        <button 
          (click)="onRatingSelect(ratingValue)" 
          [class.active]="travelService.filters().rating === ratingValue" 
          class="btn-filter">
          {{ ratingValue }}+ ⭐
        </button>
      }
      <button (click)="onRatingSelect(0)" class="btn-clear">Reset Filters</button>
    </div>
  </div>
</div>
