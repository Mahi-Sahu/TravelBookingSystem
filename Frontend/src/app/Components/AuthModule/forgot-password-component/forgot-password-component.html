<div class="auth-container">
  <h2>Reset Password</h2>
  <p class="subtitle">Enter your registered email address to receive a password reset link.</p>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <div>
      <input type="email" formControlName="email" placeholder="Email Address" />
      <span
        *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
        style="color: red; font-size: 12px"
      >
        Valid email is required.
      </span>
    </div>

    <button type="submit" [disabled]="forgotForm.invalid">Send Recovery Link</button>
  </form>

  <p>Remember your password? <a routerLink="/login">Back to Login</a></p>
</div>
