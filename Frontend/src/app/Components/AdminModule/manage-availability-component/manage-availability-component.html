<div class="admin-panel-container">

    <div class="panel-header">

        <h2>Manage Availability</h2>

        <button class="add-btn" (click)="openAddForm()">

            + Add Availability

        </button>

    </div>

    <!-- MODAL -->

    <div class="modal-backdrop" *ngIf="showModal">

        <div class="modal">

            <h3>
                {{ isEditMode ? 'Edit Availability' : 'Add Availability' }}
            </h3>

            <form #availabilityRef="ngForm" (ngSubmit)="saveAvailability()">

                <div class="form-group">

                    <label>Travel Service</label>

                    <select required name="serviceId" [(ngModel)]="availabilityForm.serviceId">

                        <option value="">
                            Select Service
                        </option>

                        <option *ngFor="let service of services" [value]="service.id">

                            {{ service.serviceName }}

                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Available Slots</label>

                    <input type="number" required name="availableSlots" [(ngModel)]="availabilityForm.availableSlots">

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select name="status" [(ngModel)]="availabilityForm.status">

                        <option value="AVAILABLE">
                            AVAILABLE
                        </option>

                        <option value="LIMITED">
                            LIMITED
                        </option>

                        <option value="FULL">
                            FULL
                        </option>

                    </select>

                </div>

                <div class="modal-actions">

                    <button class="save-btn" [disabled]="availabilityRef.invalid">

                        {{ isEditMode ? 'Update' : 'Save' }}

                    </button>

                    <button type="button" class="cancel-btn" (click)="closeModal()">

                        Cancel

                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- TABLE -->

    <table class="admin-table">

        <thead>

            <tr>
                <th>ID</th>
                <th>Service</th>
                <th>Type</th>
                <th>Available Slots</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let item of availabilities">

                <td>{{ item.id }}</td>

                <td>
                    {{ item.service?.serviceName }}
                </td>

                <td>
                    {{ item.service?.serviceType }}
                </td>

                <td>
                    {{ item.availableSlots }}
                </td>

                <td>

                    <span class="status-badge" [ngClass]="item.status.toLowerCase()">

                        {{ item.status }}

                    </span>

                </td>

                <td class="action-buttons">

                    <button class="edit-btn" (click)="editAvailability(item)">

                        Edit

                    </button>

                    <button class="delete-btn" (click)="deleteAvailability(item.id)">

                        Delete

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
